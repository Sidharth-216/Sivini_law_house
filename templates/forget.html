<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="static/forget.css">
</head>
<body>

<div class="container">
    <h2>Forgot Password</h2>
    <p>Enter your username and registered WhatsApp number. Our team will send you a reset link.</p>

    <form id="forgotPasswordForm" method="POST" onsubmit="return validateForm()">
        <label>Username:</label>
        <input type="text" id="username" name="username" required>

        <label>WhatsApp Number:</label>
        <input type="text" id="phone" name="phone" required placeholder="+91XXXXXXXXXX">

        <button type="submit">Request Reset</button>
    </form>

    <p><a href="{{ url_for('login') }}">Back to Login</a></p>
</div>

<script src="static/forget.css"></script>
</body>
</html>
